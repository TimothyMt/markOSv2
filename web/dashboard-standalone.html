<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing OS — Auto Ads Facebook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #0b1020;
  --bg-2: #0e1530;
  --panel: #121a35;
  --panel-2: #161f3e;
  --stroke: #1f2a4d;
  --stroke-2: #26335c;
  --txt: #e7ecff;
  --txt-2: #9aa6cc;
  --muted: #6b78a3;
  --primary: #5b8cff;
  --primary-2: #7c4dff;
  --green: #2dd4a7;
  --red: #ff6b8a;
  --amber: #ffc857;
  --cyan: #38d9f0;
  --radius: 16px;
  --shadow: 0 8px 30px rgba(0, 0, 0, .35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--txt);
  background:
    radial-gradient(900px 500px at 80% -10%, rgba(124, 77, 255, .18), transparent 60%),
    radial-gradient(700px 400px at 0% 0%, rgba(91, 140, 255, .14), transparent 55%),
    var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body { overflow-x: hidden; }
.app {
  display: grid;
  grid-template-columns: 248px 1fr 320px;
  min-height: 100vh;
  max-width: 100%;
}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar {
  background: linear-gradient(180deg, var(--bg-2), var(--bg));
  border-right: 1px solid var(--stroke);
  padding: 22px 16px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  position: sticky;
  top: 0;
  height: 100vh;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-logo {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  display: grid; place-items: center;
  font-weight: 800; font-size: 20px; color: #fff;
  box-shadow: 0 6px 18px rgba(91, 140, 255, .4);
}
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-name { font-weight: 700; font-size: 16px; }
.brand-sub { font-size: 12px; color: var(--txt-2); }

.nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.nav-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); margin: 14px 8px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 11px;
  color: var(--txt-2); text-decoration: none; font-size: 14px; font-weight: 500;
  transition: .15s;
}
.nav-item .ic { font-size: 16px; width: 20px; text-align: center; }
.nav-item:hover { background: var(--panel); color: var(--txt); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(91, 140, 255, .22), rgba(124, 77, 255, .22));
  color: #fff;
  box-shadow: inset 0 0 0 1px var(--stroke-2);
}

.sidebar-foot { display: flex; flex-direction: column; gap: 12px; }
.acct {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: 12px; background: var(--panel);
  border: 1px solid var(--stroke);
}
.acct-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex: none; }
.acct-dot.online { background: var(--green); box-shadow: 0 0 0 3px rgba(45, 212, 167, .18); }
.acct-name { font-size: 13px; font-weight: 600; }
.acct-meta { font-size: 11px; color: var(--muted); }
.version { font-size: 11px; color: var(--muted); text-align: center; }

/* ── Main ────────────────────────────────────────────── */
.main { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; min-width: 0; }
.main #view { min-width: 0; display: flex; flex-direction: column; gap: 20px; }

.topbar { display: flex; align-items: center; gap: 16px; }
.search {
  flex: 1; display: flex; align-items: center; gap: 10px;
  background: var(--panel); border: 1px solid var(--stroke);
  border-radius: 12px; padding: 10px 14px; max-width: 420px;
}
.search input { background: none; border: none; outline: none; color: var(--txt); width: 100%; font-size: 14px; }
.search .ic { color: var(--muted); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.ghost-btn {
  width: 40px; height: 40px; border-radius: 11px; cursor: pointer;
  background: var(--panel); border: 1px solid var(--stroke); color: var(--txt);
  font-size: 16px; position: relative;
}
.ghost-btn.badge::after {
  content: attr(data-count);
  position: absolute; top: -6px; right: -6px;
  background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
  min-width: 17px; height: 17px; border-radius: 9px; display: grid; place-items: center;
  border: 2px solid var(--bg);
}
.user { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, var(--primary-2), var(--primary));
  display: grid; place-items: center; font-weight: 700; color: #fff; font-size: 13px;
}
.user-text { display: flex; flex-direction: column; line-height: 1.2; }
.user-name { font-size: 13px; font-weight: 600; }
.user-role { font-size: 11px; color: var(--muted); }

.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.page-head h1 { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
.muted { color: var(--muted); font-size: 12.5px; }
.page-actions { display: flex; align-items: center; gap: 12px; }
.segmented { display: flex; background: var(--panel); border: 1px solid var(--stroke); border-radius: 11px; padding: 4px; }
.segmented button {
  border: none; background: none; color: var(--txt-2); cursor: pointer;
  padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
}
.segmented button.on { background: var(--primary); color: #fff; }
.primary-btn {
  border: none; cursor: pointer; color: #fff; font-weight: 600; font-size: 14px;
  padding: 11px 18px; border-radius: 11px;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  box-shadow: 0 8px 20px rgba(91, 140, 255, .35);
}

/* ── KPI cards ──────────────────────────────────────── */
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; min-width: 0; }
.kpi {
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--stroke); border-radius: var(--radius);
  padding: 16px; box-shadow: var(--shadow);
}
.kpi-top { display: flex; align-items: center; justify-content: space-between; }
.kpi-icon {
  width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; font-size: 18px;
}
.kpi-icon.spend { background: rgba(91, 140, 255, .16); }
.kpi-icon.rev   { background: rgba(45, 212, 167, .16); }
.kpi-icon.roas  { background: rgba(124, 77, 255, .16); }
.kpi-icon.click { background: rgba(56, 217, 240, .16); }
.kpi-trend { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 8px; }
.kpi-trend.up { color: var(--green); background: rgba(45, 212, 167, .12); }
.kpi-trend.down { color: var(--red); background: rgba(255, 107, 138, .12); }
.kpi-label { color: var(--txt-2); font-size: 13px; margin-top: 14px; }
.kpi-value { font-size: 24px; font-weight: 800; letter-spacing: -.02em; margin-top: 2px; }
.kpi-unit { font-size: 15px; color: var(--txt-2); margin-left: 2px; }
.spark-wrap { position: relative; height: 40px; margin-top: 10px; }
.spark { display: block; }
.chart-box { position: relative; width: 100%; }
.chart-box canvas { display: block; }

/* ── Grid / cards ───────────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; min-width: 0; }
.card {
  background: linear-gradient(180deg, var(--panel-2), var(--panel));
  border: 1px solid var(--stroke); border-radius: var(--radius);
  padding: 18px; box-shadow: var(--shadow);
}
.card { min-width: 0; }
.span-12 { grid-column: span 12; }
.span-8 { grid-column: span 8; }
.span-7 { grid-column: span 7; }
.span-6 { grid-column: span 6; }
.span-5 { grid-column: span 5; }
.span-4 { grid-column: span 4; }
.span-3 { grid-column: span 3; }
.kpi { min-width: 0; }
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-head h3 { font-size: 15px; font-weight: 700; }
.legend { display: flex; gap: 16px; font-size: 12px; color: var(--txt-2); }
.legend span { display: flex; align-items: center; gap: 6px; }
.dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.dot.a { background: var(--primary); }
.dot.b { background: var(--green); }
.dot.c1 { background: var(--primary); }
.dot.c2 { background: var(--primary-2); }
.dot.c3 { background: var(--cyan); }
.dot.c4 { background: var(--green); }
.link { color: var(--primary); font-size: 12.5px; text-decoration: none; }

.donut-wrap { position: relative; display: grid; place-items: center; padding: 6px 0; }
.donut-center { position: absolute; text-align: center; }
.donut-num { font-size: 20px; font-weight: 800; }
.legend-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.legend-list li { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--txt-2); }
.legend-list li span { margin-left: auto; color: var(--txt); font-weight: 600; }

/* ── Right rail ─────────────────────────────────────── */
.rail {
  background: linear-gradient(180deg, var(--bg-2), var(--bg));
  border-left: 1px solid var(--stroke);
  padding: 20px 16px; display: flex; flex-direction: column; gap: 16px;
}
.pill { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 8px; }
.pill.warn { color: var(--amber); background: rgba(255, 200, 87, .14); }

.timeline { list-style: none; display: flex; flex-direction: column; gap: 14px; }
.timeline li { display: flex; gap: 12px; position: relative; }
.t-time { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 42px; }
.timeline p { font-size: 13px; font-weight: 500; }
.timeline .muted { font-size: 11.5px; }

.alerts { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.alert {
  display: flex; gap: 11px; align-items: flex-start;
  padding: 11px; border-radius: 12px; border: 1px solid var(--stroke); background: var(--panel);
}
.alert .a-ic { font-size: 16px; }
.alert p { font-size: 13px; font-weight: 600; }
.alert.danger { border-left: 3px solid var(--red); }
.alert.warn { border-left: 3px solid var(--amber); }
.alert.ok { border-left: 3px solid var(--green); }

.card.mini { padding: 16px 18px; }
.status { list-style: none; display: flex; flex-direction: column; gap: 11px; }
.status li { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.status li .muted { margin-left: auto; }
.s-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.s-dot.online { background: var(--green); box-shadow: 0 0 0 3px rgba(45, 212, 167, .16); }

/* ── Topbar extras ──────────────────────────────────── */
.token-chip { font-size: 12.5px; font-weight: 600; color: var(--amber);
  background: rgba(255,200,87,.12); border: 1px solid rgba(255,200,87,.2);
  padding: 9px 12px; border-radius: 11px; white-space: nowrap; }
.only-mobile { display: none; }

/* sidebar scroll + foot */
.sidebar { overflow-y: auto; }
.sidebar .nav { flex: 1; }

/* ── Generic component kit ──────────────────────────── */
.kpis-3 { grid-template-columns: repeat(3, 1fr); }
.tag { font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 8px;
  background: var(--stroke-2); color: var(--txt-2); display: inline-block; }
.tag.green { color: var(--green); background: rgba(45,212,167,.14); }
.tag.red   { color: var(--red);   background: rgba(255,107,138,.14); }
.tag.amber { color: var(--amber); background: rgba(255,200,87,.14); }
.ghost-line { background: var(--panel); border: 1px solid var(--stroke); color: var(--txt);
  padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.ghost-line:hover { border-color: var(--stroke-2); }
.ghost-line.full { width: 100%; }
.ghost-line.sm, .primary-btn.sm { padding: 6px 12px; font-size: 12.5px; }
.bullet { list-style: none; display: flex; flex-direction: column; gap: 9px; font-size: 13.5px; color: var(--txt-2); }
.bullet.two, .bullet.three { display: grid; grid-template-columns: 1fr 1fr; gap: 9px 18px; }
.bullet b { color: var(--txt); }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { font-size: 12.5px; padding: 7px 12px; border-radius: 9px; background: var(--panel);
  border: 1px solid var(--stroke); color: var(--txt-2); }
.chip.on { background: linear-gradient(135deg, rgba(91,140,255,.22), rgba(124,77,255,.22)); color: #fff; border-color: var(--stroke-2); }
.kv { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px dashed var(--stroke);
  font-size: 13.5px; color: var(--txt-2); }
.kv:last-child { border-bottom: none; } .kv b { color: var(--txt); }

/* tables */
.tbl-wrap { overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; color: var(--muted); font-weight: 600; font-size: 11.5px;
  text-transform: uppercase; letter-spacing: .04em; padding: 8px 12px; border-bottom: 1px solid var(--stroke); }
.tbl td { padding: 11px 12px; border-bottom: 1px solid var(--stroke); color: var(--txt); }
.tbl tbody tr:hover { background: rgba(255,255,255,.02); }
.tbl tbody tr:last-child td { border-bottom: none; }

/* stepper */
.stepper { display: flex; flex-direction: column; gap: 6px; }
.step { display: flex; align-items: center; gap: 14px; padding: 12px; border-radius: 12px; border: 1px solid var(--stroke); }
.step.running { border-color: rgba(255,200,87,.4); background: rgba(255,200,87,.06); }
.step.done { opacity: .92; }
.step-dot { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center;
  font-weight: 700; font-size: 13px; background: var(--stroke-2); color: var(--txt-2); flex: none; }
.step.done .step-dot { background: var(--green); color: #06231b; }
.step.running .step-dot { background: var(--amber); color: #2a2300; }
.step-body { flex: 1; } .step-body p { font-size: 14px; font-weight: 600; }

/* persona */
.persona-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.avatar.lg { width: 46px; height: 46px; font-size: 18px; border-radius: 13px; }
.persona-name { font-weight: 700; font-size: 15px; }
.paingain { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.pg-col h4 { font-size: 14px; margin-bottom: 10px; }

/* pricing tier */
.tier { position: relative; padding: 4px 2px; }
.tier.hot { padding-top: 8px; }
.ribbon { position: absolute; top: -4px; right: 0; background: var(--primary); color: #fff;
  font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 8px; }
.tier-name { font-size: 16px; font-weight: 700; }
.tier-price { font-size: 26px; font-weight: 800; margin: 8px 0 12px; }

/* SWOT */
.swot { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.swot-cell { background: linear-gradient(180deg, var(--panel-2), var(--panel)); border: 1px solid var(--stroke);
  border-radius: var(--radius); padding: 18px; position: relative; box-shadow: var(--shadow); }
.swot-cell h4 { font-size: 15px; margin: 4px 0 12px; }
.swot-k { position: absolute; top: 14px; right: 16px; font-size: 30px; font-weight: 800; opacity: .18; }
.swot-cell.green { border-top: 3px solid var(--green); }
.swot-cell.red { border-top: 3px solid var(--red); }
.swot-cell.primary { border-top: 3px solid var(--primary); }
.swot-cell.amber { border-top: 3px solid var(--amber); }

/* SAVE / roadmap */
.save { display: flex; flex-direction: column; gap: 12px; }
.save-item { display: flex; gap: 14px; align-items: flex-start; }
.save-k { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center;
  font-weight: 800; color: #fff; background: linear-gradient(135deg, var(--primary), var(--primary-2)); flex: none; }
.save-item p { font-weight: 600; font-size: 14px; }
.roadmap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.rm-phase { padding: 14px; border-radius: 13px; border: 1px solid var(--stroke); background: var(--panel); }
.rm-tag { font-size: 11.5px; font-weight: 700; color: var(--primary); }
.rm-title { font-size: 15px; font-weight: 700; margin: 6px 0 10px; }

/* brief */
.brief { display: flex; flex-direction: column; }
.brief-row { display: flex; justify-content: space-between; gap: 16px; padding: 11px 0; border-bottom: 1px solid var(--stroke); }
.brief-row span { color: var(--txt-2); font-size: 13.5px; } .brief-row b { font-size: 13.5px; text-align: right; }
.brief-row:last-child { border-bottom: none; }

/* calendar */
.cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 16px; }
.cal-day { background: var(--panel); border: 1px solid var(--stroke); border-radius: 13px; padding: 10px; min-height: 150px; }
.cal-head { font-size: 12px; font-weight: 700; color: var(--txt-2); margin-bottom: 10px; text-align: center; }
.cal-post { font-size: 11.5px; padding: 7px 8px; border-radius: 9px; margin-bottom: 7px; line-height: 1.3;
  position: relative;
  background: var(--panel-2); border-left: 3px solid var(--primary); }
.cal-post span { display: block; font-size: 10px; font-weight: 700; opacity: .8; }
.cal-post.c1 { border-color: var(--primary); } .cal-post.c2 { border-color: var(--primary-2); }
.cal-post.c3 { border-color: var(--cyan); } .cal-post.c4 { border-color: var(--green); }
.cal-del { position: absolute; top: 4px; right: 4px; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 10px; opacity: 0; transition: .15s; }
.cal-post:hover .cal-del { opacity: 1; } .cal-del:hover { color: var(--red); }
.tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.tab { background: var(--panel); border: 1px solid var(--stroke); color: var(--txt-2);
  padding: 7px 14px; border-radius: 9px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
.tab.on { background: var(--primary); color: #fff; border-color: var(--primary); }
.cal-add { width: 100%; background: none; border: 1px dashed var(--stroke-2); color: var(--muted);
  border-radius: 9px; padding: 5px; cursor: pointer; font-size: 12px; }

/* kanban */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.kan-col { background: var(--panel); border: 1px solid var(--stroke); border-radius: var(--radius); padding: 14px; }
.kan-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
.kan-card { background: var(--panel-2); border: 1px solid var(--stroke); border-radius: 11px; padding: 12px;
  font-size: 13px; margin-bottom: 9px; }

/* script */
.script, .seq, .chat { display: flex; flex-direction: column; gap: 12px; }
.scene { padding: 11px; border-radius: 11px; background: var(--panel); border: 1px solid var(--stroke); }
.scene-t { font-size: 11.5px; font-weight: 700; color: var(--primary); margin-right: 8px; }
.scene p { font-size: 13.5px; margin-top: 7px; }

/* ugc */
.ugc-lvl { font-size: 15px; font-weight: 700; } .ugc-price { font-size: 18px; font-weight: 800; }

/* chat bubbles */
.bubble { max-width: 78%; padding: 11px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.4; }
.bubble.in { background: var(--panel); border: 1px solid var(--stroke); align-self: flex-start; border-bottom-left-radius: 4px; }
.bubble.out { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #fff;
  align-self: flex-end; border-bottom-right-radius: 4px; }

/* sequence */
.seq-step { display: flex; gap: 14px; }
.seq-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #fff;
  display: grid; place-items: center; font-weight: 700; font-size: 13px; flex: none; }
.seq-body { flex: 1; } .seq-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.seq-body p { font-size: 13.5px; }

/* sliders / bars */
.slider { margin-bottom: 14px; } .slider-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 7px; }
.track { height: 8px; border-radius: 6px; background: var(--stroke); overflow: hidden; }
.track.sm { height: 6px; }
.fillbar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--primary), var(--primary-2)); }
.fillbar.hot { background: linear-gradient(90deg, var(--amber), var(--red)); }
.voicecheck { padding: 4px 0; }

/* forms */
.form { display: flex; flex-direction: column; gap: 14px; }
.fld { display: flex; flex-direction: column; gap: 6px; font-size: 12.5px; color: var(--txt-2); }
.fld input, .sel { background: var(--panel); border: 1px solid var(--stroke); border-radius: 10px;
  padding: 10px 12px; color: var(--txt); font-size: 13.5px; font-family: inherit; outline: none; }
.fld input:focus { border-color: var(--primary); }
.sel { cursor: pointer; display: flex; justify-content: space-between; }
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--stroke); }
.toggle-row:last-child { border-bottom: none; }

/* switch */
.switch { position: relative; display: inline-block; width: 40px; height: 22px; }
.switch input { display: none; }
.track-sw { position: absolute; inset: 0; border-radius: 22px; background: var(--stroke-2); transition: .2s; cursor: pointer; }
.track-sw::before { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px; transition: .2s; }
.switch input:checked + .track-sw { background: var(--primary); }
.switch input:checked + .track-sw::before { transform: translateX(18px); }

/* vertical funnel */
.vfunnel { display: flex; flex-direction: column; gap: 10px; }
.vf-row { display: flex; align-items: center; gap: 14px; }
.vf-bar { width: var(--w); min-width: 140px; background: linear-gradient(135deg, var(--primary), var(--primary-2));
  border-radius: 10px; padding: 12px 14px; display: flex; justify-content: space-between; color: #fff; }
.vf-tier { font-weight: 600; font-size: 13.5px; } .vf-val { font-weight: 700; font-size: 13.5px; }
.vf-meta { display: flex; flex-direction: column; gap: 3px; font-size: 11.5px; color: var(--txt-2); }

/* rows */
.rows { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px;
  border: 1px solid var(--stroke); background: var(--panel); }
.row-main { flex: 1; } .row-main p { font-size: 13.5px; font-weight: 600; }
.opt-ic { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; font-size: 15px; background: var(--stroke-2); }
.opt-ic.scale, .opt-ic.activate, .opt-ic.dup { background: rgba(45,212,167,.16); }
.opt-ic.pause { background: rgba(255,107,138,.16); }
.opt-act { display: flex; gap: 8px; }
.minirow { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--stroke); font-size: 13.5px; }
.minirow .up { color: var(--green); } .minirow .down { color: var(--red); }

/* action buttons + toast */
.icon-btn { background: var(--panel); border: 1px solid var(--stroke); color: var(--txt-2);
  width: 26px; height: 26px; border-radius: 8px; cursor: pointer; font-size: 12px; flex: none; line-height: 1; }
.icon-btn:hover { color: var(--red); border-color: var(--red); }
.alert .row-main { flex: 1; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translate(-50%, 20px);
  background: var(--panel-2); border: 1px solid var(--stroke-2); color: var(--txt);
  padding: 12px 18px; border-radius: 12px; font-size: 13.5px; box-shadow: var(--shadow);
  opacity: 0; transition: .3s; z-index: 100; pointer-events: none; }
.toast.show { opacity: 1; transform: translate(-50%, 0); }
code { background: var(--panel); border: 1px solid var(--stroke); border-radius: 6px;
  padding: 1px 6px; font-size: 12px; color: var(--cyan); }

/* realtime live indicator */
.live-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
  color: var(--green); background: rgba(45,212,167,.12); border: 1px solid rgba(45,212,167,.2);
  padding: 8px 11px; border-radius: 11px; white-space: nowrap; }
.live-dot i { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 0 3px rgba(45,212,167,.18); }
.live-dot.off { color: var(--muted); background: var(--panel); border-color: var(--stroke); }
.live-dot.off i { background: var(--muted); box-shadow: none; }
.live-dot.pulse i { animation: livepulse .6s ease 2; }
@keyframes livepulse { 50% { transform: scale(1.7); } }

/* ad cards / account cards */
.adcard-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
.adcard-img { height: 120px; border-radius: 12px; background: var(--panel); display: grid; place-items: center;
  font-size: 34px; border: 1px solid var(--stroke); margin-bottom: 10px; }

  display: grid; place-items: center; font-size: 20px; }

    const body = `

          ${runBtn(task, running ? '↻ Đang chạy' : '⚡ Chạy bằng AI')}

  // Đổ full content của skill_run vào các slot .ai-output (gọi sau mỗi route)
  function renderAIContent(txt) {
    const t = (txt || '').trim();
    if (t.startsWith('<')) return t;             // skill xuất HTML → render trực tiếp
    const esc = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<p>' + esc
      .replace(/^#### (.*)$/gm,'</p><h5>$1</h5><p>')
      .replace(/^### (.*)$/gm,'</p><h4>$1</h4><p>')
      .replace(/^## (.*)$/gm,'</p><h3>$1</h3><p>')
      .replace(/^# (.*)$/gm,'</p><h2>$1</h2><p>')
      .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
      .replace(/^[-*] (.*)$/gm,'• $1')
      .replace(/\n{2,}/g,'</p><p>')
      .replace(/\n/g,'<br>') + '</p>';
  }

  function renderRail() {
    const u = M.bizUser;

    const quota = u && u.token_quota != null ? u.token_quota : null;
    const pct = (used != null && quota) ? Math.min(100, Math.round(used / quota * 100)) : null;

      : `<section class="card"><div class="card-head"><h3>Token</h3></div>
          <span class="muted">Chưa nối dữ liệu thật. Chạy server có Supabase để xem quota theo user.</span></section>`;

  function route() {
    let id = (location.hash.replace('#','') || 'home');
    if (id === 'pipeline' || id === 'agents') id = 'dossier';   // gộp → Hồ sơ doanh nghiệp
    const page = P[id] || P.home;
    const isHome = (P[id] ? id : 'home') === 'home';
    killCharts();
    renderSidebar(id);
    document.body.classList.toggle('chat-mode', isHome);   // ẩn rail, bố cục hội thoại
    const actions = page.actions || '';
    document.getElementById('view').innerHTML =
      (isHome ? '' : pageHead(page.title, page.sub, actions)) + page.render();
    if (page.mount) page.mount();
    if (apiAvailable && M.bizEnabled) fillAgentOutputs();   // đổ output AI thật vào trang
    document.querySelector('.main').scrollTo(0,0);
    document.body.classList.remove('nav-open');

  /* ════════════ backend API + actions ════════════ */
  let apiAvailable = false;
  const API = {
    async get(p)        { const r = await fetch(p); if (!r.ok) throw 0; return r.json(); },
    async post(p, body) { const r = await fetch(p, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body||{}) }); if (!r.ok) throw 0; return r.json(); },
    async del(p)        { const r = await fetch(p, { method:'DELETE' }); if (!r.ok) throw 0; return r.json(); },
  };

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2600);
  }

  /* ── dữ liệu nghiệp vụ thật + AI agent ── */
  let _bizUserId = null;
  function bizQuery() { return _bizUserId != null ? ('?user_id=' + _bizUserId) : ''; }
  async function refreshBiz() {
    if (!apiAvailable) return;
    try {
      const biz = await API.get('api/biz' + bizQuery());
      Object.assign(window.MOCK, biz);
      if (biz.bizUserId != null) _bizUserId = biz.bizUserId;
    } catch (e) { /* chưa nối Supabase → bỏ qua */ }
  }
  async function refreshAds() {
    if (!apiAvailable) return;
    try {
      const ads = await API.get('api/biz/ads?days=' + _adsDays + bizQuery().replace('?','&'));
      Object.assign(window.MOCK, ads);
    } catch (e) { /* chưa có dữ liệu Ads → bỏ qua */ }
  }
  const SKILL_TO_TASK = { market_research:'market', competitor:'competitor', customer_insight:'customer',
    psychology_pricing:'pricing', swot:'swot', synthesis:'strategy', tactical_playbook:'strategy' };
  let _modalRun = null;
  function showModal(title, content, meta) {
    _modalRun = meta ? { ...meta, title, content } : null;
    let ov = document.getElementById('bizModal');
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'bizModal'; ov.className = 'modal-ov';
      ov.innerHTML = `<div class="modal"><div class="modal-head"><h3></h3>
        <button class="icon-btn" id="bizModalX">✕</button></div>
        <div class="modal-body ai-output expanded"></div><div class="modal-foot"></div></div>`;
      document.body.appendChild(ov);
      ov.addEventListener('click', (e) => { if (e.target === ov) ov.classList.remove('show'); });
      ov.querySelector('#bizModalX').addEventListener('click', () => ov.classList.remove('show'));
    }
    ov.querySelector('h3').textContent = title;
    ov.querySelector('.modal-body').innerHTML = renderAIContent(content || '(trống)');
    const foot = ov.querySelector('.modal-foot');
    if (meta && meta.id) {
      foot.style.display = 'flex';
      foot.innerHTML = `
        <div class="rate-group">
          <span class="muted">Chất lượng:</span>
          <button class="rate-btn ${meta.rating>=4?'on up':''}" data-act="rate-skillrun" data-rating="5" title="Tốt">👍</button>
          <button class="rate-btn ${(meta.rating&&meta.rating<=2)?'on down':''}" data-act="rate-skillrun" data-rating="1" title="Chưa đạt">👎</button>
          ${meta.rating?`<span class="muted">đã chấm</span>`:''}
        </div>
        <div class="modal-foot-r">
          <button class="ghost-line sm" data-act="copy-skillrun">📋 Copy</button>
          ${meta.task?`<button class="primary-btn sm" data-act="regen-skillrun" data-task="${meta.task}">🔄 Tạo lại bản mới</button>`:''}
        </div>`;
    } else { foot.style.display = 'none'; foot.innerHTML = ''; }
    ov.classList.add('show');

  /* ── Max chat ── */
  function chatBubble(m) {
    const who = m.role === 'user' ? 'me' : 'max';
    const avatar = m.role === 'user' ? '🧑' : '🤖';
    return `<div class="cmsg ${who}"><span class="cav">${avatar}</span>
      <div class="cbub">${renderAIContent(m.content)}</div></div>`;
  }
  function heroHTML(disabled) {
    const cards = CHAT_EXAMPLES.map(e =>
      `<button class="eg-card" ${disabled?'disabled':''} data-act="chat-eg" data-text="${e.text.replace(/"/g,'&quot;')}">
        <span class="eg-ic">${e.icon}</span><span>${e.text}</span></button>`).join('');
    const note = disabled
      ? `<p class="hero-note">⚠️ Max cần backend thật (Supabase + API key LLM) để trò chuyện. Trên bản demo tĩnh, Max tạm nghỉ — các trang khác vẫn xem được bằng dữ liệu mẫu.</p>`
      : '';
    return `<div class="hero">
      <div class="hero-logo">🤖</div>
      <h1 class="hero-title">Xin chào! Tôi là Max</h1>
      <p class="hero-sub">CMO ảo của bạn. Kể tôi nghe về doanh nghiệp — tôi sẽ chẩn đoán thị trường,
        đối thủ, khách hàng rồi vạch chiến lược và nội dung.</p>
      <div class="eg-grid">${cards}</div>
      ${note}
    </div>`;
  }
  function renderChat(disabled) {
    const stream = document.getElementById('chatStream');
    if (!stream) return;
    if (!_chatMsgs.length) {
      stream.classList.add('is-empty');
      stream.innerHTML = heroHTML(disabled);
    } else {
      stream.classList.remove('is-empty');
      stream.innerHTML = `<div class="cthread">` + _chatMsgs.map(chatBubble).join('') +
        (_chatBusy ? `<div class="cmsg max"><span class="cav">🤖</span><div class="cbub typing"><i></i><i></i><i></i></div></div>` : '') +
        `</div>`;
      stream.scrollTop = stream.scrollHeight;
    }
    const sug = document.getElementById('chatSuggest');
    if (sug) sug.innerHTML = _chatMsgs.length ? _chatSuggest.map(s => s.task
      ? `<button class="chip-btn" data-act="chat-suggest" data-task="${s.task}">${s.label}</button>`
      : `<button class="chip-btn" data-act="chat-suggest" data-goto="${s.goto}">${s.label}</button>`).join('') : '';
  }
  function growBox(box) {
    if (!box) return;
    box.style.height = 'auto';
    box.style.height = Math.min(box.scrollHeight, 180) + 'px';
  }
  async function initChat() {
    const disabled = !apiAvailable || M.bizEnabled === false;
    if (disabled) { _chatMsgs = []; _chatSuggest = []; renderChat(true); return; }
    try {
      const r = await API.get('api/chat/history' + bizQuery());
      _chatMsgs = r.history || [];
    } catch (e) { _chatMsgs = []; }
    renderChat();
    const box = document.getElementById('chatBox');
    if (box) {
      box.focus();
      box.oninput = () => growBox(box);
      box.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } };
    }
  }
  async function sendChat(preset) {
    const box = document.getElementById('chatBox');
    const text = (preset || (box ? box.value.trim() : '')).trim();
    if (!text || _chatBusy) return;
    if (box) { box.value = ''; growBox(box); }
    _chatMsgs.push({ role: 'user', content: text });
    _chatBusy = true; renderChat();
    try {
      const r = await API.post('api/chat', { message: text, user_id: _bizUserId });
      _chatBusy = false;
      if (r.error) { _chatMsgs.push({ role: 'assistant', content: '⚠️ ' + r.error }); }
      else {
        _chatMsgs = r.history || _chatMsgs.concat({ role: 'assistant', content: r.reply });
        _chatStage = r.stage || _chatStage;
        _chatSuggest = r.suggestions || [];
        if (r.profileComplete) refreshBiz();   // hồ sơ vừa đủ → nạp dữ liệu thật
      }
    } catch (e) { _chatBusy = false; _chatMsgs.push({ role: 'assistant', content: '⚠️ Lỗi kết nối tới Max.' }); }
    const mini = document.querySelector('.jmini');
    if (mini) mini.outerHTML = journeyMini(_chatStage);
    renderChat();
    const box2 = document.getElementById('chatBox'); if (box2) box2.focus();
  }

  async function handleAction(el) {
    const act = el.dataset.act;
    if (act === 'chat-send') { sendChat(); return; }
    if (act === 'chat-eg') { sendChat(el.dataset.text); return; }
    if (act === 'toggle-collapse') {
      const card = el.closest('.card'); const out = card && card.querySelector('.ai-output');
      if (out) { const open = out.classList.toggle('expanded'); el.textContent = open ? 'Thu gọn ▴' : 'Xem đầy đủ ▾'; }
      return;
    }
    if (act === 'cal-view') { _calView = el.dataset.view; route(); return; }
    if (act === 'cal-open-week') { _calWeek = parseInt(el.dataset.week) || 1; _calView = 'week'; route(); return; }
    if (act === 'cal-gen') {
      // Prototype: sinh bài THEO TUẦN/SLOT (nhẹ, đúng ngữ cảnh) — M1 nối skill thật
      const w = el.dataset.week, track = el.dataset.track, day = el.dataset.day;
      const what = day != null ? `ngày ${+day + 1} tuần ${w}` : (track === 'camp' ? `bài campaign tuần ${w}` : `bài Always-on tuần ${w}`);
      if (!apiAvailable || !M.bizEnabled) { toast(`(Mẫu) Sẽ sinh ${what} bằng AI ở M1`); return; }
      try {
        await API.post('api/biz/agent', { task: 'full', user_id: _bizUserId }); // tạm map; M1 có task 'content' theo tuần
        toast(`Đang sinh ${what}…`);
      } catch (e) { toast('Không khởi chạy được'); }
      return;
    }
    if (act === 'add-campaign-occasion') {
      // Prototype client-side: tạo campaign theo dịp (window theo TUẦN). M1 nối backend.
      const P0 = M.calendarPlan; if (!P0) return;
      const name = prompt('Tên campaign (vd: Sale Tết):'); if (!name) return;
      const occasion = prompt('Dịp / mùa vụ (vd: Tết Nguyên Đán):', 'Dịp đặc biệt') || '';
      const offer = prompt('Offer (vd: Giảm 30%):', 'Ưu đãi đặc biệt') || '';
      const fromWeek = Math.max(1, Math.min(P0.weeks, parseInt(prompt(`Bắt đầu từ tuần nào? (1–${P0.weeks}):`, '1')) || 1));
      const toWeek = Math.max(fromWeek, Math.min(P0.weeks, parseInt(prompt(`Kết thúc tuần nào? (1–${P0.weeks}):`, String(fromWeek))) || fromWeek));
      const colors = ['#f59e0b', '#ef4444', '#ec4899', '#8b5cf6'];
      const color = colors[(P0.campaigns || []).length % colors.length];
      // sinh sẵn 2 bài/đợt làm mẫu (đầu & cuối window)
      const posts = [
        { week: fromWeek, day: 2, title: `Khởi động ${name} — ${offer}` },
        { week: toWeek, day: 4, title: `Ngày cuối ${name}` },
      ];
      (P0.campaigns = P0.campaigns || []).push({ name, occasion, offer, color, fromWeek, toWeek, posts });
      route(); toast('Đã thêm campaign theo dịp (mẫu) — Always-on vẫn chạy song song');
      return;
    }
    if (act === 'chat-suggest') {
      if (el.dataset.goto) { location.hash = el.dataset.goto; return; }
      if (el.dataset.task) {
        try {
          const r = await API.post('api/biz/agent', { task: el.dataset.task, user_id: _bizUserId });
          if (r.error) { toast(r.error); return; }
          _chatMsgs.push({ role: 'assistant', content: `Em bắt đầu chạy phân tích **${el.dataset.task}** rồi — Sếp xem tiến trình ở mục Dữ liệu thật & Agent, xong em báo nhé.` });
          renderChat(); toast('Max đang chạy phân tích…'); refreshBiz();
        } catch (e) { toast('Không khởi chạy được'); }
      }
      return;
    }
    if (!apiAvailable) { toast('Tính năng này cần backend — chạy: python run_web.py'); if (el.type === 'checkbox') el.checked = !el.checked; return; }

    // ── AI agent + dữ liệu thật (không theo luồng state web_*) ──
    if (act === 'run-agent') {
      try {
        const r = await API.post('api/biz/agent', { task: el.dataset.task, user_id: _bizUserId });
        if (r.error) { toast(r.error); return; }
        toast('Đã khởi chạy AI agent — theo dõi tiến trình realtime');
        await refreshBiz(); renderRail(); renderTopbar(); route();
      } catch (e) { toast('Không khởi chạy được agent'); }
      return;
    }
    if (act === 'view-skillrun') {
      try {
        const r = await API.get('api/biz/skillrun/' + el.dataset.id);
        showModal((r.skill_name || 'Output') + ' · v' + (r.version || 1), r.content || '(trống)',
          { id: r.id, skill_name: r.skill_name, task: SKILL_TO_TASK[r.skill_name], rating: r.rating });
      } catch (e) { toast('Không tải được nội dung'); }
      return;
    }
    if (act === 'rate-skillrun') {
      if (!_modalRun) return;
      const rating = +el.dataset.rating;
      try {
        const r = await API.post('api/biz/skillrun/' + _modalRun.id + '/rate', { rating });
        if (r.error) { toast(r.error); return; }
        _modalRun.rating = rating;
        showModal(_modalRun.title, _modalRun.content, _modalRun);   // re-render highlight
        toast(rating >= 4 ? 'Cảm ơn! 👍 Max ghi nhận' : 'Đã ghi nhận 👎 — Max sẽ cải thiện');
        refreshBiz();
      } catch (e) { toast('Không lưu được đánh giá'); }
      return;
    }
    if (act === 'copy-skillrun') {
      if (_modalRun && navigator.clipboard) {
        navigator.clipboard.writeText(_modalRun.content || '').then(() => toast('Đã copy nội dung'));
      }
      return;
    }
    if (act === 'regen-skillrun') {
      try {
        const r = await API.post('api/biz/agent', { task: el.dataset.task, user_id: _bizUserId });
        if (r.error) { toast(r.error); return; }
        document.getElementById('bizModal').classList.remove('show');
        toast('Đang tạo lại bản mới — xong sẽ có version mới'); refreshBiz();
      } catch (e) { toast('Không khởi chạy được'); }
      return;
    }
    if (act === 'switch-user') {
      const users = M.bizUsers || [];
      if (!users.length) { toast('Chưa có user nào'); return; }
      const list = users.map((u, i) => `${i + 1}. ${u.name || u.user_id} (${u.user_id})`).join('\n');
      const pick = prompt('Chọn user để xem (nhập số thứ tự):\n' + list);
      if (pick === null) return;
      const idx = parseInt(pick) - 1;
      if (users[idx]) { _bizUserId = users[idx].user_id; await refreshBiz(); await refreshAds(); renderRail(); renderTopbar(); route(); toast('Đã chuyển user'); }
      return;
    }
    if (act === 'ads-days') {
      _adsDays = parseInt(el.dataset.days) || 7;
      await refreshAds(); route();
      return;
    }
    if (act === 'fb-connect') {
      try {
        const r = await API.get('api/biz/fb/connect-url' + bizQuery());
        if (r.error) { toast(r.error); return; }
        window.open(r.url, '_blank');
        toast('Mở cửa sổ Facebook — đồng ý quyền rồi quay lại, bấm "7/30 ngày" để tải số liệu');
      } catch (e) { toast('Không tạo được link kết nối Facebook'); }
      return;
    }

    try {
      let res;
      if (act === 'add-tracked') {
        const name = prompt('Tên fanpage / đối thủ cần theo dõi:');
        if (!name || !name.trim()) return;
        res = await API.post('api/tracked', { name: name.trim() }); toast('Đã thêm đối thủ theo dõi');
      } else if (act === 'del-tracked') {
        res = await API.del('api/tracked/' + el.dataset.id); toast('Đã bỏ theo dõi');
      } else if (act === 'toggle-job') {
        res = await API.post('api/jobs/' + el.dataset.name + '/toggle'); toast('Đã cập nhật tác vụ');
      } else if (act === 'opt-apply') {
        res = await API.post('api/optimizations/' + el.dataset.id + '/apply'); toast('Đã áp dụng tối ưu');
      } else if (act === 'opt-dismiss') {
        res = await API.post('api/optimizations/' + el.dataset.id + '/apply'); toast('Đã bỏ qua đề xuất');
      } else if (act === 'dismiss-alert') {
        res = await API.post('api/alerts/' + el.dataset.id + '/dismiss');
      } else if (act === 'set-setting') {
        res = await API.post('api/settings', { key: el.dataset.key, value: el.checked ? 1 : 0 }); toast('Đã lưu cài đặt');
      } else if (act === 'add-campaign') {
        const name = prompt('Tên chiến dịch:'); if (!name || !name.trim()) return;
        res = await API.post('api/campaigns', { name: name.trim() }); toast('Đã tạo chiến dịch');
      } else if (act === 'del-campaign') {
        res = await API.del('api/campaigns/' + el.dataset.id); toast('Đã xoá chiến dịch');
      } else if (act === 'add-post') {
        const title = prompt('Tiêu đề bài đăng:'); if (!title || !title.trim()) return;
        res = await API.post('api/calendar', { day: +el.dataset.day, pillar: 'Educate', title: title.trim() }); toast('Đã thêm bài');
      } else if (act === 'del-calendar') {
        res = await API.del('api/calendar/' + el.dataset.id);
      } else if (act === 'gen-content') {
        const topic = prompt('Chủ đề nội dung:', 'Khuyến mãi mùa hè'); if (topic === null) return;
        res = await API.post('api/content/generate', { topic: topic.trim() || 'Khuyến mãi' }); toast('Đã tạo gói nội dung');
      } else if (act === 'add-report') {
        const name = prompt('Tên báo cáo:'); if (!name || !name.trim()) return;

      } else if (act === 'del-report') {
        res = await API.del('api/reports/' + el.dataset.id);
      } else if (act === 'connect-account') {
        const name = prompt('Tên tài khoản quảng cáo:'); if (!name || !name.trim()) return;
        res = await API.post('api/accounts', { name: name.trim() }); toast('Đã kết nối tài khoản');
      } else if (act === 'toggle-account') {
        res = await API.post('api/accounts/' + el.dataset.id + '/toggle');
      } else if (act === 'disconnect-account') {
        res = await API.del('api/accounts/' + el.dataset.id); toast('Đã ngắt kết nối');
      } else if (act === 'add-quota') {
        const v = prompt('Cộng thêm quota (token):', '50000'); if (v === null) return;
        res = await API.post('api/users/' + el.dataset.id + '/addquota', { value: parseInt(v) || 0 }); toast('Đã cộng quota');
      } else if (act === 'reset-usage') {
        res = await API.post('api/users/' + el.dataset.id + '/reset'); toast('Đã reset usage');
      } else if (act === 'notify-test') {
        const r = await API.post('api/notify/test');
        toast(r.ok ? 'Đã gửi! Kiểm tra Telegram' : (r.enabled ? 'Gửi lỗi — kiểm tra token/chat_id' : 'Chưa cấu hình Telegram (token + chat_id)'));
        return;
      }
      if (res) { Object.assign(window.MOCK, res); renderRail(); renderTopbar(); route(); }

  }

  document.addEventListener('click', (e) => {
    const el = e.target.closest('[data-act]');
    if (el && el.tagName !== 'INPUT') { e.preventDefault(); handleAction(el); }
  });
  document.addEventListener('change', (e) => {
    const el = e.target.closest('input[data-act]');
    if (el) handleAction(el);
  });

  window.addEventListener('hashchange', route);
  document.getElementById('navToggle').addEventListener('click', () => document.body.classList.toggle('nav-open'));

  /* ════════════ realtime (SSE) ════════════ */
  let _lastStream = '';
  let _sseLive = false;
  function setLive(on) {
    _sseLive = on;
    const dot = document.getElementById('liveDot');
    if (dot) dot.classList.toggle('off', !on);
  }
  let _jobSig = '';
  function applyStream(data) {
    if (data === _lastStream) return;          // dedupe các bản trùng
    _lastStream = data;
    let state; try { state = JSON.parse(data); } catch (e) { return; }
    Object.assign(window.MOCK, state);
    // khi 1 job AI đổi trạng thái (running→done/error) → nạp lại dữ liệu thật
    const sig = JSON.stringify((state.agentJobs || []).map(j => [j.id, j.status, j.progress]));
    if (sig !== _jobSig) {
      _jobSig = sig;
      if ((state.agentJobs || []).some(j => j.status === 'done')) refreshBiz();
    }
    const editing = document.activeElement &&
      /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
    renderRail(); renderTopbar();
    if (!editing) route();                     // không phá thao tác đang gõ
    const dot = document.getElementById('liveDot');
    if (dot) { dot.classList.add('pulse'); setTimeout(() => dot.classList.remove('pulse'), 1200); }
  }
  function startStream() {
    if (typeof EventSource === 'undefined') return;
    try {
      const es = new EventSource('api/stream');
      es.onopen = () => setLive(true);
      es.onerror = () => setLive(false);       // EventSource tự reconnect
      es.onmessage = (ev) => applyStream(ev.data);
    } catch (e) { /* bỏ qua */ }
  }

  /* ════════════ boot: nạp dữ liệu, mở SSE, fallback mock ════════════ */
  (async function boot() {
    try {
      const state = await API.get('api/bootstrap');
      Object.assign(window.MOCK, state);
      _lastStream = JSON.stringify(state);
      apiAvailable = true;
      await refreshBiz();                        // nạp dữ liệu nghiệp vụ thật (nếu có Supabase)
      await refreshAds();                        // nạp ads snapshots thật
    } catch (e) { /* không có backend → dùng dữ liệu mock nhúng sẵn */ }
    renderRail();
    renderTopbar();
    route();
    if (apiAvailable) startStream();
  })();
})();

</script>
</body>
</html>
