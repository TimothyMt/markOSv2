name: Deploy demo dashboard to GitHub Pages

# Deploy the static web/ demo (Marketing OS dashboard) to GitHub Pages.
# Sau khi bật Pages (Settings → Pages → Source: GitHub Actions), workflow này
# sẽ publish thư mục web/ mỗi khi push.

on:
  push:
    branches:
      - claude/web-app-interface-haw8wu
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy 1 deploy tại một thời điểm
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
